<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHCP E2E Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { max-width: 480px; width: 100%; padding: 2rem; }
        h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #f0f6fc; }
        .subtitle { color: #8b949e; font-size: 0.875rem; margin-bottom: 2rem; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; color: #8b949e; margin-bottom: 0.25rem; }
        input { width: 100%; padding: 0.5rem 0.75rem; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 1rem; margin-bottom: 1rem; }
        input:focus { outline: none; border-color: #58a6ff; }
        button { width: 100%; padding: 0.625rem; background: #238636; border: none; border-radius: 6px; color: #fff; font-size: 0.875rem; font-weight: 600; cursor: pointer; }
        button:hover { background: #2ea043; }
        .result { margin-top: 1rem; padding: 1rem; border-radius: 6px; display: none; }
        .result.success { display: block; background: #0d2818; border: 1px solid #238636; }
        .result.error { display: block; background: #2d1117; border: 1px solid #f85149; color: #f85149; }
        .result-value { font-size: 1.5rem; font-weight: 600; color: #3fb950; }
        .result.error .result-value { color: #f85149; font-size: 1rem; }
        .links { display: flex; gap: 1rem; margin-top: 1rem; }
        .links a { color: #58a6ff; text-decoration: none; font-size: 0.8rem; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>GHCP E2E Demo</h1>
        <p class="subtitle">Automated bug lifecycle with GitHub Copilot</p>

        <div class="card">
            <form id="calc-form">
                <label for="a">Dividend (a)</label>
                <input type="number" id="a" name="a" step="any" value="10" required>
                <label for="b">Divisor (b)</label>
                <input type="number" id="b" name="b" step="any" value="2" required>
                <button type="submit">Calculate a &divide; b</button>
            </form>
            <div id="result" class="result"></div>
        </div>

        <div class="links">
            <a href="/health">/health</a>
            <a href="/calculate?a=10&b=2">/calculate (JSON)</a>
        </div>
    </div>

    <script>
        document.getElementById("calc-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const a = document.getElementById("a").value;
            const b = document.getElementById("b").value;
            const el = document.getElementById("result");
            try {
                const res = await fetch(`/calculate?a=${a}&b=${b}`);
                const data = await res.json();
                if (res.ok) {
                    el.className = "result success";
                    el.innerHTML = `<div class="result-value">${data.result}</div>`;
                } else {
                    el.className = "result error";
                    el.innerHTML = `<div class="result-value">${data.error}: ${data.message}</div>`;
                }
            } catch (err) {
                el.className = "result error";
                el.innerHTML = `<div class="result-value">${err.message}</div>`;
            }
        });
    </script>
</body>
</html>
