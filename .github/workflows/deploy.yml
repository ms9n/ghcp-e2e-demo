name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'infra/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  RESOURCE_GROUP: ghcpe2e-rg
  BASE_NAME: ghcpe2e
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR details
        id: acr
        run: |
          ACR_NAME=$(az deployment group show \
            --resource-group "$RESOURCE_GROUP" \
            --name main \
            --query 'properties.outputs.acrName.value' -o tsv)
          ACR_LOGIN_SERVER=$(az deployment group show \
            --resource-group "$RESOURCE_GROUP" \
            --name main \
            --query 'properties.outputs.acrLoginServer.value' -o tsv)
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        run: az acr login --name "${{ steps.acr.outputs.acr_name }}"

      - name: Build and push Docker image
        run: |
          IMAGE="${{ steps.acr.outputs.acr_login_server }}/ghcp-e2e-demo:${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Container App
        run: |
          LOCATION=$(az group show --name "$RESOURCE_GROUP" --query location -o tsv)
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters \
              baseName="$BASE_NAME" \
              location="$LOCATION" \
              containerImage="$IMAGE" \
              copilotGithubToken="${{ secrets.COPILOT_GITHUB_TOKEN }}" \
              githubToken="${{ secrets.GH_PAT }}" \
              githubRepo="${{ github.repository }}"

      - name: Verify deployment
        run: |
          APP_FQDN=$(az deployment group show \
            --resource-group "$RESOURCE_GROUP" \
            --name main \
            --query 'properties.outputs.containerAppFqdn.value' -o tsv)
          echo "App URL: https://$APP_FQDN"
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$APP_FQDN/health")
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed!"
          else
            echo "Health check failed with status: $STATUS"
            exit 1
          fi

      - name: Post deployment summary
        if: always()
        run: |
          APP_FQDN=$(az deployment group show \
            --resource-group "$RESOURCE_GROUP" \
            --name main \
            --query 'properties.outputs.containerAppFqdn.value' -o tsv 2>/dev/null || echo "unknown")
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image**: \`$IMAGE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **App URL**: https://$APP_FQDN" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
